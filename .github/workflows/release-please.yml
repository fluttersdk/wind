name: Release Please

# Manual-only trigger: this workflow does NOT fire on every master push.
# Run it from the Actions tab ("Run workflow") or via
# `gh workflow run "Release Please" --repo fluttersdk/wind`
# when you want release-please to scan commits since the last release
# and open / update a Release PR.
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open or update Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: master
