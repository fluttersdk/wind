name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Permit PRs opened by claude[bot] (claude-issue-agent's fix PRs).
          # Default is empty allowlist; without this entry the action errors
          # out with "Workflow initiated by non-human actor: claude (type: Bot)".
          allowed_bots: "claude[bot]"
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Read CLAUDE.md and the relevant .claude/rules/*.md for any file path the PR touches; ARCHITECTURE.md for design context. Follow every rule there as-is.

            Focus areas:
            - className parser correctness (token precedence, dark: pair rule)
            - Widget API stability (constructor signature changes are breaking)
            - Coverage delta (test/ must accompany lib/ changes)
            - my-coding skill compliance (no try/catch swallow, no @ts-ignore equivalents)

            Use mcp__github_inline_comment__create_inline_comment for line-specific feedback. Apply gh pr comment for summary-level points only.
