name: CI & Deploy

on:
  push:
    branches: [master, v1]
  pull_request:
    branches: [master, v1]

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Run tests with coverage
        run: ./tool/coverage.sh 90

  build-demo:
    name: Build Demo (preview gallery)
    needs: ci
    if: false # TODO: enable once preview deploy target is configured
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Build Demo (lib/main.dart)
        working-directory: example
        run: flutter build web --release --target lib/main.dart --base-href /

      - name: Upload Demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-build
          path: example/build/web/
          retention-days: 7

  deploy-demo:
    name: Deploy Demo
    needs: build-demo
    if: false # TODO: enable once preview deploy target is configured
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'master' && 'Demo Production' || 'Demo Development' }}
    steps:
      - name: Download Demo artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-build
          path: demo-build/

      - name: Deploy (attempt 1)
        id: deploy
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          source: demo-build/*
          target: ${{ vars.DEPLOY_PATH }}
          strip_components: 1
          rm: true
          overwrite: true

      - name: Deploy (attempt 2)
        if: steps.deploy.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          source: demo-build/*
          target: ${{ vars.DEPLOY_PATH }}
          strip_components: 1
          rm: true
          overwrite: true
