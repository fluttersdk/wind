name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force build + deploy demo regardless of path filter'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflows-lint:
    name: Workflows lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

      - name: dependabot.yml shape
        if: hashFiles('.github/dependabot.yml') != ''
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/dependabot.yml'))"
          echo "dependabot.yml parses as valid YAML"

  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/ example/lib/

      - name: Analyze code
        run: dart analyze lib/ test/ example/lib/

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Run tests with coverage (90% floor)
        run: ./tool/coverage.sh 90

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Validate publish archive
        run: dart pub publish --dry-run

  changes:
    name: Detect demo-affecting changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      demo: ${{ steps.filter.outputs.demo }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Filter paths
        id: filter
        run: |
          set -euo pipefail
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] \
             || ! git rev-parse "${{ github.event.before }}^{commit}" >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            BASE="${{ github.event.before }}"
          fi
          if git diff --name-only "$BASE" HEAD 2>/dev/null | grep -qE '^(lib|example|web)/|^pubspec\.(yaml|lock)$'; then
            echo "demo=true" >> "$GITHUB_OUTPUT"
            echo "demo-affecting changes detected"
          else
            echo "demo=false" >> "$GITHUB_OUTPUT"
            echo "no demo-affecting changes; skipping build + deploy"
          fi

  build-demo:
    name: Build Demo (preview gallery)
    needs: [ci, changes]
    # `always()` so the job is evaluated even when `changes` was skipped
    # (which happens on workflow_dispatch). Then gate explicitly on ci
    # success + the per-event condition.
    if: |
      always()
      && needs.ci.result == 'success'
      && (
        (github.event_name == 'push' && needs.changes.outputs.demo == 'true')
        || (github.event_name == 'workflow_dispatch' && inputs.force_deploy == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Build Demo (lib/main.dart)
        working-directory: example
        run: flutter build web --release --target lib/main.dart --base-href /

      - name: Upload Demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: demo-build
          path: example/build/web/
          retention-days: 7

  deploy-demo:
    name: Deploy Demo
    needs: build-demo
    if: |
      needs.build-demo.result == 'success'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: Demo Production
    steps:
      - name: Download Demo artifact
        uses: actions/download-artifact@v8
        with:
          name: demo-build
          path: demo-build/

      - name: Deploy via SCP (attempt 1)
        id: deploy
        continue-on-error: true
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          source: demo-build/*
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          rm: true
          overwrite: true

      - name: Deploy via SCP (attempt 2 on transient failure)
        if: steps.deploy.outcome == 'failure'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          source: demo-build/*
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          rm: true
          overwrite: true
