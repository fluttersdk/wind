name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflows-lint:
    name: Workflows lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

      - name: dependabot.yml shape
        if: hashFiles('.github/dependabot.yml') != ''
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/dependabot.yml'))"
          echo "dependabot.yml parses as valid YAML"

  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/ example/lib/

      - name: Analyze code
        run: dart analyze lib/ test/ example/lib/

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Run tests with coverage (90% floor)
        run: ./tool/coverage.sh 90

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Validate publish archive
        run: dart pub publish --dry-run

  build-demo:
    name: Build Demo (preview gallery)
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Build Demo (lib/main.dart)
        working-directory: example
        run: flutter build web --release --target lib/main.dart --base-href /

      - name: Upload Demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-build
          path: example/build/web/
          retention-days: 7

  deploy-demo:
    name: Deploy Demo
    needs: build-demo
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Demo Production
    steps:
      - name: Download Demo artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-build
          path: demo-build/

      - name: Deploy via SCP (attempt 1)
        id: deploy
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          source: demo-build/*
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          rm: true
          overwrite: true

      - name: Deploy via SCP (attempt 2 on transient failure)
        if: steps.deploy.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          source: demo-build/*
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          rm: true
          overwrite: true
