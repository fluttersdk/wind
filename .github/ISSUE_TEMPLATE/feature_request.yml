name: Feature Request
description: Suggest a new feature or enhancement for Wind UI
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Wind UI? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like to see?
      placeholder: A clear description of the feature and why it's needed.
    validations:
      required: true

  - type: textarea
    id: classname-syntax
    attributes:
      label: Proposed className Syntax
      description: If this involves new utility classes, what syntax would you expect?
      placeholder: |
        backdrop-blur-sm
        backdrop-blur-md
        backdrop-blur-lg
      render: dart

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a real scenario where you'd use this feature.
      placeholder: "When building a modal overlay, I need to blur the background content..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: textarea
    id: code
    attributes:
      label: Example Code
      description: How would this look in practice?
      render: dart
