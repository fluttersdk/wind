name: fluttersdk_wind
description: Utility-first Flutter styling inspired by Tailwind. className syntax, dark mode, responsive prefixes, and a hosted MCP server so AI coding agents never hallucinate tokens.
version: 1.0.0
homepage: https://fluttersdk.com/wind
repository: https://github.com/fluttersdk/wind
issue_tracker: https://github.com/fluttersdk/wind/issues
topics:
  - ui
  - widget
  - tailwind
  - responsive
  - design-system

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0
  fluttersdk_wind_diagnostics_contracts: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
