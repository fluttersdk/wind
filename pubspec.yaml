name: fluttersdk_wind
description: Tailwind CSS for Flutter. Write className='flex p-4 bg-white dark:bg-gray-800' and Wind renders optimized widget trees with dark mode and responsive breakpoints.
version: 1.1.1
homepage: https://fluttersdk.com/wind
repository: https://github.com/fluttersdk/wind
issue_tracker: https://github.com/fluttersdk/wind/issues
topics:
  - ui
  - widget
  - tailwind
  - responsive
  - design-system

screenshots:
  - description: "Wind example gallery: Tailwind-syntax className UI rendered with W-prefix widgets, dark mode, and responsive breakpoints."
    path: screenshots/wind-gallery-overview.png

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

# Declared explicitly so pub.dev's platform detection is not silently narrowed
# by the `dart:io` import-graph trace; wind supports every Flutter platform.
platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0
  fluttersdk_wind_diagnostics_contracts: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
