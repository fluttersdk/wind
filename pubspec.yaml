name: fluttersdk_wind
description: Utility-first styling framework for Flutter inspired by Tailwind CSS. Build UIs with WDiv, WText, WButton using intuitive className syntax.
version: 1.0.0-alpha.9
homepage: https://wind.fluttersdk.com
repository: https://github.com/fluttersdk/wind
issue_tracker: https://github.com/fluttersdk/wind/issues
topics:
  - ui
  - widgets
  - tailwind
  - utility-first
  - styling

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0
  keyboard_actions: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # fluttersdk_dusk is dev-only:
  # imported by lib/src/dusk_integration.dart (opt-in sub-barrel)
  fluttersdk_dusk: ^1.0.0-alpha.1

dependency_overrides:
  fluttersdk_dusk:
    path: ../fluttersdk_dusk
