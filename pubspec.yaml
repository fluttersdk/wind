name: fluttersdk_wind
description: Utility-first styling framework for Flutter inspired by Tailwind CSS. Build UIs with WDiv, WText, WButton using intuitive className syntax.
version: 1.0.0
homepage: https://fluttersdk.com/wind
repository: https://github.com/fluttersdk/wind
issue_tracker: https://github.com/fluttersdk/wind/issues
topics:
  - ui
  - widgets
  - tailwind
  - utility-first
  - styling

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0
  keyboard_actions: ^4.2.1
  fluttersdk_wind_diagnostics_contracts: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
